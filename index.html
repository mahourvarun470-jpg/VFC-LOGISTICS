<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
}

.hero{
display:flex;
justify-content:center;
align-items:center;
gap:50px;
padding:80px 5%;
min-height:100vh;
background:linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1200&q=80') center/cover;
}

.hero-content{
max-width:600px;
}

.hero-content h1{
font-size:60px;
font-weight:800;
margin-bottom:10px;
}

.hero-content h2{
color:#d32f2f;
margin-bottom:20px;
}

.hero-content p{
font-size:18px;
line-height:1.6;
margin-bottom:10px;
}

.booking-box{
background:#1a1a1a;
padding:25px;
border-radius:10px;
width:400px;
border-top:4px solid #d32f2f;
}

.booking-box h3{
margin-bottom:15px;
}

.booking-box input,
.booking-box select{
width:100%;
padding:12px;
margin:8px 0;
background:#222;
border:1px solid #444;
color:white;
}

.btn{
width:100%;
padding:12px;
background:#d32f2f;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25d366;
color:white;
padding:15px 20px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

@media(max-width:768px){

.hero{
flex-direction:column;
}

.booking-box{
order:1;
width:100%;
}

.hero-content{
order:2;
text-align:center;
}

.hero-content h1{
font-size:40px;
}
}
</style>
