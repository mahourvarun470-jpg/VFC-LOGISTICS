<!-- Form Structure (Make sure your input IDs match these) -->
<form id="bookingForm" onsubmit="sendBooking(event)" style="font-family: 'Segoe UI', sans-serif; max-width: 450px; margin: auto; padding: 20px; background: #fdfdfd; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <!-- Inputs ke fields standard rakhein (name, phone, pickup, drop, truck) -->
    
    <button type="submit" id="submitBtn" style="width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;">
        <span id="btnText">Request via WhatsApp & Email</span>
        <div id="btnSpinner" style="display: none; width: 20px; height: 20px; border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.8s linear infinite;"></div>
    </button>
</form>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-toast {
        position: fixed; top: 20px; right: 20px; background: #10B981; color: white; 
        padding: 15px 25px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        z-index: 1000; font-family: sans-serif; font-weight: 500; animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
</style>

<script>
    function sendBooking(e) {
        e.preventDefault();

        // Elements select karna UI update ke liye
        const btn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const btnSpinner = document.getElementById("btnSpinner");

        // Loading state ON (Maza tabhi aayega jab lagega backend chal raha hai)
        btn.style.pointerEvents = "none";
        btn.style.opacity = "0.8";
        btnText.innerText = "Processing...";
        btnSpinner.style.display = "block";

        let name = document.getElementById("name").value;
        let phone = document.getElementById("phone").value;
        let pickup = document.getElementById("pickup").value;
        let drop = document.getElementById("drop").value;
        let truck = document.getElementById("truck").value;

        // WhatsApp message structure
        let msg = "*NEW ENTERPRISE FLEET BOOKING*%0A%0A" +
                  "*Client/Company:* " + encodeURIComponent(name) + "%0A" +
                  "*Contact:* " + encodeURIComponent(phone) + "%0A" +
                  "*Origin:* " + encodeURIComponent(pickup) + "%0A" +
                  "*Destination:* " + encodeURIComponent(drop) + "%0A" +
                  "*Fleet Selected:* " + encodeURIComponent(truck);

        let whatsappURL = "https://wa.me/919541842526?text=" + msg;

        // AJAX/Fetch FormSubmit backend api ke throug background mein data bhejenge
        let formData = new FormData();
        formData.append("Company_Name", name);
        formData.append("Phone_Number", phone);
        formData.append("Pickup_Location", pickup);
        formData.append("Drop_Location", drop);
        formData.append("Selected_Truck", truck);
        formData.append("_subject", "New Fleet Booking Request - VFC Logistics");
        formData.append("_template", "table"); // Email ekdum clean dynamic table layout mein aayegi

        fetch("https://formsubmit.co/ajax/fitnesslakshay75@gmail.com", {
            method: "POST",
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            // UI Reset after success
            btn.style.pointerEvents = "auto";
            btn.style.opacity = "1";
            btnText.innerText = "Request via WhatsApp & Email";
            btnSpinner.style.display = "none";

            // Ek modern toast notification popup dikhayenge screen par
            let toast = document.createElement("div");
            toast.className = "success-toast";
            toast.innerText = "✓ Booking Logged Successfully!";
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 4000);

            // Form clear karo
            document.getElementById("bookingForm").reset();

            // Boom! Ab bina page load toote directly WhatsApp par redirect
            window.open(whatsappURL, '_blank');
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Kuch dikkat aayi, par aap direct WhatsApp kar sakte hain!");
            window.open(whatsappURL, '_blank');
        });
    }
</script>
